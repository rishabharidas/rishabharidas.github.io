<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rishabharidas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        /* Default / Dark Mode Variables */
        --bg-gray: #1e1e1f;
        --pixel-white: #ffffff;
        --pixel-black: #000000;
        --text-gray: #8a8a8f;
      }

      /* System Light Mode Overrides */
      @media (prefers-color-scheme: light) {
        :root {
          --bg-gray: #f0f0f2; /* Soft grayish-white to prevent blinding light mode */
          --pixel-white: #000000; /* Invert white to black */
          --pixel-black: #ffffff; /* Invert black to white */
          --text-gray: #65656a; /* Darker gray for readable text on light background */
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-gray);
        color: var(--pixel-white);
        font-family: "Press Start 2P", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        transition:
          background-color 0.3s ease,
          color 0.3s ease; /* Smooth transition when toggling system theme */
      }

      .maintenance-container {
        text-align: center;
        width: 100%;
        max-width: 440px;
      }

      /* Small, optimal icon canvas */
      .pixel-canvas {
        width: 120px;
        height: 120px;
        margin: 0 auto 32px auto;
        display: block;
      }

      /* Floating micro-animations */
      .clipart-satellite {
        animation: satelliteFloat 5s ease-in-out infinite;
      }

      .clipart-astronaut {
        animation: astroFloat 4s ease-in-out infinite;
      }

      h1 {
        font-size: 0.95rem;
        letter-spacing: 1px;
        line-height: 1.5;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      p {
        font-size: 0.6rem;
        color: var(--text-gray);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 32px;
      }

      /* Pixelated Contact Button */
      .btn-contact {
        display: inline-block;
        font-size: 0.65rem;
        color: var(--pixel-white);
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 1px;
        background-color: var(--pixel-black);
        padding: 12px 20px;
        border: 3px solid var(--pixel-white);
        box-shadow: 4px 4px 0px var(--text-gray);
        transition:
          background-color 0.15s steps(2),
          color 0.15s steps(2),
          transform 0.15s steps(2),
          box-shadow 0.15s steps(2);
        cursor: pointer;
      }

      .btn-contact:hover {
        background-color: var(--pixel-white);
        color: var(--pixel-black);
        box-shadow: 2px 2px 0px var(--text-gray);
        transform: translate(2px, 2px);
      }

      .btn-contact:active {
        box-shadow: 0px 0px 0px var(--text-gray);
        transform: translate(4px, 4px);
      }

      @keyframes satelliteFloat {
        0%,
        100% {
          transform: translateY(0px) rotate(0deg);
        }
        50% {
          transform: translateY(-4px) rotate(-2deg);
        }
      }

      @keyframes astroFloat {
        0%,
        100% {
          transform: translateY(0px) rotate(0deg);
        }
        50% {
          transform: translateY(5px) rotate(4deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="maintenance-container">
      <svg
        class="pixel-canvas"
        viewBox="0 0 64 64"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        shape-rendering="crispEdges"
      >
        <g class="clipart-satellite">
          <rect
            x="4"
            y="16"
            width="10"
            height="6"
            fill="var(--pixel-black)"
            stroke="var(--pixel-white)"
            stroke-width="1"
          />
          <line x1="9" y1="16" x2="9" y2="22" stroke="var(--pixel-white)" />
          <rect
            x="26"
            y="16"
            width="10"
            height="6"
            fill="var(--pixel-black)"
            stroke="var(--pixel-white)"
            stroke-width="1"
          />
          <line x1="31" y1="16" x2="31" y2="22" stroke="var(--pixel-white)" />
          <rect x="14" y="17" width="12" height="4" fill="var(--pixel-white)" />
          <rect x="17" y="14" width="6" height="10" fill="var(--pixel-white)" />
          <path
            d="M 20 24 L 20 27 M 17 27 L 23 27"
            stroke="var(--pixel-white)"
            stroke-width="1"
          />
        </g>

        <g class="clipart-astronaut">
          <path
            d="M 20 21 Q 24 38 42 42"
            stroke="var(--pixel-white)"
            stroke-width="1"
            fill="none"
            stroke-dasharray="2 2"
          />

          <rect
            x="39"
            y="38"
            width="4"
            height="10"
            fill="var(--pixel-black)"
            stroke="var(--pixel-white)"
            stroke-width="1"
          />
          <rect x="43" y="38" width="8" height="9" fill="var(--pixel-white)" />
          <rect x="43" y="30" width="8" height="8" fill="var(--pixel-white)" />
          <rect x="43" y="32" width="5" height="4" fill="var(--pixel-black)" />
          <rect x="45" y="47" width="2" height="4" fill="var(--pixel-white)" />
          <rect x="49" y="47" width="2" height="4" fill="var(--pixel-white)" />
          <rect x="51" y="40" width="3" height="2" fill="var(--pixel-white)" />
        </g>

        <rect x="52" y="12" width="1" height="1" fill="currentColor" />
        <rect
          x="10"
          y="45"
          width="1"
          height="1"
          fill="currentColor"
          opacity="0.6"
        />
        <rect x="32" y="52" width="1" height="1" fill="currentColor" />
      </svg>

      <h1>Maintenance ongoing</h1>
      <p>ETA: Unknown.</p>

      <a
        href="https://github.com/rishabharidas"
        target="_blank"
        rel="noopener noreferrer"
        class="btn-contact"
      >
        Contact
      </a>
    </div>
  </body>
</html>
